<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Gallery</title>
    <link href="./style.css" rel="stylesheet">
    <link rel="manifest" href="./manifest.json">
</head>
<body class="bg-yazhi-alabaster text-yazhi-outerspace antialiased min-h-screen">

    <!-- Sticky Header -->
    <header class="sticky top-0 z-40 bg-yazhi-tiffany/90 backdrop-blur-md border-b border-yazhi-teal py-4 px-6 flex justify-between items-center shadow-md">
        <h1 id="eventName" class="text-xl font-serif text-yazhi-outerspace font-bold tracking-wide">Gallery</h1>
        <div class="text-sm font-medium text-yazhi-outerspace"><span id="photoCount">0</span> Photos</div>
    </header>

    <!-- Controls Bar -->
    <div id="controlsBar" class="px-6 py-2 flex justify-end bg-yazhi-alabaster/95 backdrop-blur-sm sticky top-[60px] z-30 hidden border-b border-yazhi-teal/20">
        <select id="sortOrder" class="bg-transparent text-yazhi-teal font-bold outline-none text-sm cursor-pointer">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
        </select>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="flex flex-col items-center justify-center pt-32 px-6 text-center">
        <svg class="w-16 h-16 text-yazhi-teal mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        <h2 class="text-lg font-bold text-yazhi-outerspace">Waiting for the first moment...</h2>
        <p class="text-sm text-yazhi-outerspace/70 mt-2">Photos will appear here automatically.</p>
    </div>

    <!-- Main Grid -->
    <main id="galleryGrid" class="grid grid-cols-3 gap-1 p-1 pb-20 hidden">
        <!-- Photos injected here via JS -->
    </main>

    <!-- Lightbox Overlay -->
    <div id="lightbox" class="fixed inset-0 z-50 bg-yazhi-outerspace/95 hidden flex flex-col justify-center items-center opacity-0 transition-opacity duration-300 overflow-auto">
        <button id="closeLightbox" class="absolute top-4 right-4 p-3 text-yazhi-alabaster hover:text-yazhi-tiffany">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <img id="lightboxImg" src="" class="max-w-full max-h-[80vh] object-contain mb-8 shadow-lg">
        <a id="downloadBtn" href="" download class="bg-yazhi-teal text-yazhi-alabaster font-bold py-3 px-8 rounded-full shadow-[0_0_15px_rgba(0,128,128,0.4)] active:scale-95 transition-transform">
            Save Photo
        </a>
    </div>

    <!-- Event Ended Overlay -->
    <div id="eventEndedOverlay" class="fixed inset-0 z-50 bg-yazhi-alabaster/95 backdrop-blur-sm hidden flex-col justify-center items-center text-center p-6">
        <h2 class="text-3xl font-serif text-yazhi-teal font-bold mb-2">Thank You</h2>
        <p class="text-yazhi-outerspace">The event has concluded. You can continue to view and download photos.</p>
        <button onclick="document.getElementById('eventEndedOverlay').classList.add('hidden')" class="mt-8 border-2 border-yazhi-teal text-yazhi-teal font-bold px-6 py-2 rounded-full hover:bg-yazhi-teal hover:text-yazhi-alabaster transition-colors">Return to Gallery</button>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="./app.js"></script>
    
    <script>
      document.addEventListener("DOMContentLoaded", () => {
          // Connect to the server
          const liveSocket = io(window.location.origin);
          
          // Listen for the direct message from the Rust Backend
          liveSocket.on('new_photo', (data) => {
              console.log("Instant photo received!", data);
              
              const grid = document.getElementById('galleryGrid');
              const emptyState = document.getElementById('emptyState');
              const photoCount = document.getElementById('photoCount');

              // Hide the "Waiting for moments..." screen
              if (emptyState) emptyState.classList.add('hidden');
              if (grid) grid.classList.remove('hidden');

              // Instantly inject the new photo at the top of the grid!
              if (grid) {
                  const imgWrapper = document.createElement('div');
                  imgWrapper.innerHTML = `<img src="${data.url}" class="w-full aspect-square object-cover" />`;
                  grid.prepend(imgWrapper.firstElementChild);
              }

              // Update the photo counter text
              if (photoCount) {
                  photoCount.textContent = parseInt(photoCount.textContent) + 1;
              }
          });

          // Fallback just in case the manual API ping is used
          liveSocket.on('refresh_gallery', () => {
              window.location.reload(true); 
          });
      });
    </script>
</body>
</html>
